# Pipeline CI/CD - Java com Maven
# Etapas: Build → Test → Cobertura → Deploy (GitHub Pages)
# O site gerado (relatórios de testes + cobertura) é publicado como uma URL pública.

name: Java CI/CD with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Permissões necessárias para o job de deploy-pages
permissions:
  contents: read
  pages: write
  id-token: write
  checks: write

jobs:

  # ──────────────────────────────────────────
  # ETAPA 1 — BUILD
  # Compila o projeto e salva o JAR gerado.
  # ──────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compile with Maven
        run: mvn clean compile -DskipTests

      - name: Package JAR
        run: mvn package -DskipTests

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 7

  # ──────────────────────────────────────────
  # ETAPA 2 — TESTES UNITÁRIOS
  # Executa os testes JUnit e publica os
  # resultados como anotações no PR do GitHub.
  # ──────────────────────────────────────────
  test:
    name: Unit Tests
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run unit tests
        run: mvn clean test

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: JUnit Test Results
          path: target/surefire-reports/*.xml
          reporter: java-junit
          fail-on-error: true

      - name: Upload raw test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 7

  # ──────────────────────────────────────────
  # ETAPA 3 — COBERTURA DE CÓDIGO
  # Executa os testes via JaCoCo e gera
  # um relatório HTML de cobertura.
  # ──────────────────────────────────────────
  coverage:
    name: Code Coverage
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run tests with JaCoCo
        run: mvn clean verify

      - name: Upload JaCoCo HTML report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 7

  # ──────────────────────────────────────────
  # ETAPA 4 — DEPLOY NO GITHUB PAGES
  # Gera o site completo do Maven (relatório
  # de testes + cobertura + info do projeto)
  # e publica no GitHub Pages. Só executa em
  # push para main. A URL aparece no resumo
  # da execução no GitHub Actions.
  # ──────────────────────────────────────────
  deploy-site:
    name: Deploy Site to GitHub Pages
    needs: [ test, coverage ]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Generate Maven site (tests + coverage + reports)
        run: mvn clean verify site

      - name: Upload site to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
